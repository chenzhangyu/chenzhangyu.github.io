    99|# Pagination
   100|pagination:
   101|  enabled: true
   102|
   103|related_blog_posts:
   104|  enabled: true
   105|  max_related: 5
   106|
   107|# Giscus comments (RECOMMENDED)
   108|# Follow instructions on https://giscus.app/ to setup for your repo to fill out the information below.
   109|giscus:
   110|  repo: # <your-github-user-name>/<your-github-repo-name>
   111|  repo_id: # leave empty or specify your repo_id (see https://giscus.app/)
   112|  category: Comments # name of the category under which discussions will be created
   113|  category_id: # leave empty or specify your category_id (see https://giscus.app/)
   114|  mapping: title # identify discussions by post title
   115|  strict: 1 # use strict identification mode
   116|  reactions_enabled: 1 # enable (1) or disable (0) emoji reactions
   117|  input_position: bottom # whether to display input form below (bottom) or above (top) the comments
   118|  dark_theme: dark # name of the dark color scheme (preferred works well with al-folio dark mode)
   119|  light_theme: light # name of the light color scheme (preferred works well with al-folio light mode)
   120|  emit_metadata: 0
   121|  lang: en
   122|
   123|# Disqus comments (DEPRECATED)
   124|disqus_shortname: al-folio # put your disqus shortname
   125|# https://help.disqus.com/en/articles/1717111-what-s-a-shortname
   126|
   127|# External sources.
   128|# If you have blog posts published on medium.com or other external sources,
   129|# you can display them in your blog by adding a link to the RSS feed.
   130|# Optional: Set default categories and tags for posts from each source.
   131|external_sources:
