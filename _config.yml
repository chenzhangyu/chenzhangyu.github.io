   260|# -----------------------------------------------------------------------------
   261|# Jekyll Archives
   262|# -----------------------------------------------------------------------------
   263|
   264|jekyll-archives:
   265|  posts:
   266|    enabled: [year, tags, categories] # enables year, tag and category archives (remove if you need to disable one of them).
   267|    permalinks:
   268|      year: "/blog/:year/"
   269|      tags: "/blog/:type/:name/"
   270|      categories: "/blog/:type/:name/"
   271|  books:
   272|    enabled: [year, tags, categories] # enables year, tag and category archives (remove if you need to disable one of them).
   273|
   274|display_tags: ["formatting", "images", "links", "math", "code", "blockquotes"] # these tags will be displayed on the front page of your blog
   275|display_categories: ["external-services"] # these categories will be displayed on the front page of your blog
   276|
   277|# -----------------------------------------------------------------------------
   278|# Jekyll Scholar
   279|# -----------------------------------------------------------------------------
   280|
   281|scholar:
   282|  last_name: [Einstein]
   283|  first_name: [Albert, A.]
   284|
   285|  style: apa
   286|  locale: en
   287|
   288|  source: /_bibliography/
   289|  bibliography: papers.bib
   290|  bibliography_template: bib
   291|  # Note: if you have latex math in your bibtex, the latex filter
   292|  # preprocessing may conflict with MathJAX if the latter is enabled.
   293|  # See https://github.com/alshedivat/al-folio/issues/357.
   294|  bibtex_filters: [latex, smallcaps, superscript]
   295|
   296|  replace_strings: true
   297|  join_strings: true
   298|
   299|  details_dir: bibliography
   300|  details_link: Details
   301|
   302|  query: "@*"
   303|  group_by: year
   304|  group_order: descending
   305|
   306|# Display different badges withs stats for your publications
   307|# Customize badge behavior in _layouts/bib.liquid
   308|enable_publication_badges:
   309|  altmetric: true # Altmetric badge (Customization options: https://badge-docs.altmetric.com/index.html)
   310|  dimensions: true # Dimensions badge (Customization options: https://badge.dimensions.ai/)
   311|  google_scholar: true # Google Scholar badge (https://scholar.google.com/intl/en/scholar/citations.html)
   312|  inspirehep: true # Inspire HEP badge (https://help.inspirehep.net/knowledge-base/citation-metrics/)
   313|
   314|# Filter out certain bibtex entry keywords used internally from the bib output
   315|filtered_bibtex_keywords:
   316|  [
   317|    abbr,
   318|    abstract,
   319|    additional_info,
   320|    altmetric,
   321|    annotation,
   322|    arxiv,
   323|    award,
   324|    award_name,
   325|    bibtex_show,
   326|    blog,
   327|    code,
   328|    dimensions,
   329|    eprint,
   330|    google_scholar_id,
   331|    hal,
   332|    html,
   333|    inspirehep_id,
   334|    pdf,
   335|    pmid,
   336|    poster,
   337|    preview,
   338|    selected,
   339|    slides,
   340|    supp,
   341|    video,
   342|    website,
   343|  ]
   344|
   345|# Maximum number of authors to be shown for each publication (more authors are visible on click)
   346|max_author_limit: 3 # leave blank to always show all authors
   347|more_authors_animation_delay: 10 # more authors are revealed on click using animation; smaller delay means faster animation
   348|
   349|# Enables publication thumbnails. If disabled, none of the publications will display thumbnails, even if specified in the bib entry.
   350|enable_publication_thumbnails: true
   351|
   352|# -----------------------------------------------------------------------------
   353|# Jekyll Link Attributes
   354|# -----------------------------------------------------------------------------
   355|
   356|# These are the defaults
   357|external_links:
   358|  enabled: true
   359|  rel: external nofollow noopener
   360|  target: _blank
   361|  exclude:
   362|
   363|# -----------------------------------------------------------------------------
   364|# Responsive WebP Images
   365|# -----------------------------------------------------------------------------
   366|
   367|# MAKE SURE imagemagick is installed and on your PATH before enabling imagemagick. In a terminal, run:
   368|#   convert -version
   369|imagemagick:
   370|  enabled: true # enables responsive images for your site (recommended, see https://github.com/alshedivat/al-folio/issues/537)
   371|  widths:
   372|    - 480
   373|    - 800
   374|    - 1400
   375|  input_directories:
   376|    - assets/img/
   377|  input_formats:
   378|    - ".jpg"
   379|    - ".jpeg"
   380|    - ".png"
   381|    - ".tiff"
   382|    - ".gif"
   383|  output_formats:
   384|    webp: "-auto-orient -quality 85"
   385|
   386|# Lazy loading images
   387|#   If you enable lazy loading, all images will add the loading="lazy" attribute.
   388|#   This will make your site load faster, but it may not be supported in all browsers.
   389|#   You can also set loading="" to other values for specific images to override the default behavior.
   390|#   Options: "auto", "eager", "lazy"
   391|#   See https://web.dev/browser-level-image-lazy-loading/ for more information.
   392|lazy_loading_images: true # enables lazy loading of images (recommended)
